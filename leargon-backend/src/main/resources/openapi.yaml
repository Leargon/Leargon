        names:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        interfacesEntities:
          type: array
          items:
            $ref: '#/components/schemas/BusinessEntitySummaryResponse'
        implementsEntities:
