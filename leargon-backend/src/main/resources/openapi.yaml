          description: Key of the root (top-level) ancestor entity, null if this entity is itself top-level
          example: sales
        rootName:
          type: string
          nullable: true
          description: Name of the root ancestor entity in default locale, null if this entity is itself top-level
          example: Sales
    BusinessEntityTreeResponse:
      type: object
      required:
      - key
      - names
      - descriptions
      - children
      properties:
        key:
          type: string
          description: BusinessEntity key (hierarchical slug)
          example: customer
        parent:
          $ref: '#/components/schemas/BusinessEntitySummaryResponse'
        names:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        children:
          type: array
          items:
            $ref: '#/components/schemas/BusinessEntityTreeResponse'
          description: Child business entities
    BusinessEntityVersionResponse:
      type: object
      required:
      - versionNumber
      - changedBy
      - changeType
      - createdAt
      properties:
        versionNumber:
          type: integer
          description: Version number
          example: 1
        changedBy:
          $ref: '#/components/schemas/UserSummaryResponse'
        changeType:
          type: string
          enum:
          - CREATE
          - UPDATE
          - OWNER_CHANGE
          - PARENT_CHANGE
          - INTERFACE_CHANGE
          - CLASSIFICATION_CHANGE
          description: Type of change
          example: CREATE
        changeSummary:
          type: string
          nullable: true
          description: Human-readable summary of changes
          example: Initial creation
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this version was created
          example: '2024-01-15T10:30:00Z'
    ChangePasswordRequest:
      type: object
      required:
      - currentPassword
      - newPassword
      properties:
        currentPassword:
          type: string
          format: password
