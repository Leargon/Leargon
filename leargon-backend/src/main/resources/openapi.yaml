              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /search:
    get:
      tags:
      - Search
      summary: Search across the catalogue
      description: Search business entities, domains, processes, and organisational units by name or description.
      operationId: search
      security:
      - bearerAuth: []
      parameters:
      - name: q
        in: query
        required: true
        description: Search query (minimum 2 characters)
        schema:
          type: string
          minLength: 2
      - name: types
        in: query
        required: false
        description: Filter by entity types (defaults to all types if omitted)
        schema:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultType'
        style: form
        explode: true
      - name: limit
        in: query
        required: false
        description: Maximum total number of results (default 20, max 50)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Query too short (minimum 2 characters)
        '401':
          description: Not authenticated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /authentication/login or /authentication/signup
  schemas:
    AddProcessEntityRequest:
      type: object
      properties:
        entityKey:
          type: string
          nullable: true
          description: Key of an existing business entity
        createEntity:
          $ref: '#/components/schemas/CreateBusinessEntityRequest'
    AdministrationChangePasswordRequest:
      type: object
      required:
      - newPassword
      properties:
        newPassword:
          type: string
          format: password
          minLength: 8
          description: New password (minimum 8 characters)
    AssignBoundedContextRequest:
      type: object
      properties:
        boundedContextKey:
          type: string
          nullable: true
          description: Bounded context key to assign (null to unassign)
    AuthResponse:
      type: object
      required:
      - accessToken
      - tokenType
      - expiresIn
      - user
      properties:
        accessToken:
          type: string
          description: JWT access token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          description: Token type (always "Bearer")
          example: Bearer
        expiresIn:
          type: integer
          description: Token expiration time in seconds
          example: 3600
        user:
          $ref: '#/components/schemas/UserResponse'
    AzureConfigResponse:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
          description: Whether Azure Entra ID login is configured and available
          example: false
        tenantId:
          type: string
          nullable: true
          description: Azure tenant ID (only present when enabled)
          example: null
        clientId:
          type: string
          nullable: true
          description: Azure client/application ID (only present when enabled)
          example: null
    AzureLoginRequest:
      type: object
      required:
      - idToken
      properties:
        idToken:
          type: string
          description: Azure Entra ID token obtained from MSAL
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIs...
    BusinessDomainResponse:
      type: object
      required:
      - key
      - createdBy
      - names
      - createdAt
      - updatedAt
      properties:
        key:
          type: string
          description: BusinessDomain key (hierarchical slug)
          example: sales
        parent:
          $ref: '#/components/schemas/BusinessDomainSummaryResponse'
        type:
          $ref: '#/components/schemas/BusinessDomainType'
        effectiveType:
          $ref: '#/components/schemas/BusinessDomainType'
        createdBy:
          $ref: '#/components/schemas/UserSummaryResponse'
        names:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        subdomains:
          type: array
          items:
            $ref: '#/components/schemas/BusinessDomainSummaryResponse'
        boundedContexts:
          type: array
          items:
            $ref: '#/components/schemas/BoundedContextSummaryResponse'
        classificationAssignments:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationAssignmentResponse'
        missingMandatoryFields:
          type: array
          nullable: true
          items:
            type: string
          description: List of mandatory fields that are currently missing values
        mandatoryFields:
          type: array
          nullable: true
          items:
            type: string
          description: List of fields configured as mandatory for this entity type
        visionStatement:
          type: string
          nullable: true
          description: Vision statement for the bounded context
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: '2024-01-15T10:30:00Z'
    BoundedContextSummaryResponse:
      type: object
      required:
      - key
      - name
      - domainKey
      - domainName
      properties:
        key:
          type: string
          description: Bounded context key
          example: sales/default
        name:
          type: string
          description: Bounded context name in default locale
          example: Sales
        domainKey:
          type: string
          description: Parent domain key
          example: sales
        domainName:
          type: string
          description: Parent domain name in default locale
          example: Sales Domain
    BoundedContextResponse:
      type: object
      required:
      - key
      - names
      - domain
      - createdAt
      - updatedAt
      properties:
        key:
          type: string
        names:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        contextType:
          type: string
          nullable: true
          enum:
          - FEATURE
          - APPLICATION
          - SYSTEM
          - TEAM
          - SHARED_KERNEL
        domain:
          $ref: '#/components/schemas/BusinessDomainSummaryResponse'
        createdBy:
          $ref: '#/components/schemas/UserSummaryResponse'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateBoundedContextRequest:
      type: object
      required:
      - names
      properties:
        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LocalizedText'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        contextType:
          type: string
          nullable: true
          enum:
          - FEATURE
          - APPLICATION
          - SYSTEM
          - TEAM
          - SHARED_KERNEL
    UpdateBoundedContextNamesRequest:
      type: object
      required:
      - names
      properties:
        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LocalizedText'
    UpdateBoundedContextDescriptionsRequest:
      type: object
      required:
      - descriptions
      properties:
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
    BusinessDomainSummaryResponse:
      type: object
      required:
      - key
      - name
      properties:
        key:
          type: string
          description: BusinessDomain key
          example: sales
        name:
          type: string
          description: BusinessDomain name in default locale
          example: Sales
    BusinessDomainTreeResponse:
      type: object
      required:
      - key
      - names
      - children
      properties:
        key:
          type: string
          description: BusinessDomain key
          example: sales
