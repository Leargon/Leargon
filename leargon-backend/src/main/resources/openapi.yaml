        dataProcessors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DataProcessorSummaryResponse'
          description: Data processors linked to this entity
        missingMandatoryFields:
          type: array
          nullable: true
          items:
            type: string
          description: List of mandatory fields that are currently missing values
        mandatoryFields:
          type: array
          nullable: true
          items:
            type: string
          description: List of fields configured as mandatory for this entity type
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: '2024-01-15T10:30:00Z'
    BusinessEntitySummaryResponse:
      type: object
      required:
      - key
      - name
      properties:
        key:
          type: string
