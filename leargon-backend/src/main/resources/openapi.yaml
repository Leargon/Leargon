        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LocalizedText'
          description: Names for the value
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
          description: Descriptions for the value
    CreateProcessRequest:
      type: object
      required:
      - names
      properties:
        names:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LocalizedText'
          description: Names for the process (at least one required)
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
          description: Descriptions for the process
        code:
          type: string
          nullable: true
          description: Process code (used as key if set)
          example: ORD-FULFILL
        processType:
          $ref: '#/components/schemas/ProcessType'
        processOwnerUsername:
          type: string
          nullable: true
          description: Username of the process owner (defaults to creator if not specified)
        inputEntityKeys:
          type: array
          items:
            type: string
          description: Keys of business entities to add as inputs
        outputEntityKeys:
          type: array
          items:
            type: string
          description: Keys of business entities to add as outputs
        parentProcessKey:
          type: string
          nullable: true
          description: Key of the parent process (for creating child processes from diagram)
    CreateSupportedLocaleRequest:
      type: object
      required:
      - localeCode
      - displayName
      properties:
        localeCode:
          type: string
          description: Locale code (e.g., 'en', 'de', 'fr') from ISO 639-1
          example: fr
          minLength: 2
          maxLength: 2
        displayName:
          type: string
          description: Human-readable locale name
          example: French
          minLength: 1
          maxLength: 100
        isActive:
          type: boolean
          description: Whether this locale is active
          default: true
        sortOrder:
          type: integer
          description: Display order
          default: 0
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: User not found
        path:
          type: string
          description: Request path
          example: /administration/users/999
        status:
          type: integer
          description: HTTP status code
          example: 404
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: '2024-01-15T10:30:00Z'
    FieldChange:
      type: object
      required:
      - field
      - oldValue
      - newValue
      properties:
        field:
          type: string
          description: Name of the changed field
          example: name
        oldValue:
          type: string
          nullable: true
          description: Previous value
          example: Customer
        newValue:
          type: string
          nullable: true
          description: New value
          example: Client
    LocalizedBusinessDomainResponse:
      type: object
      required:
