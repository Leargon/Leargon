      - name
      - createdAt
      - updatedAt
      properties:
        key:
          type: string
          description: BusinessDomain key
        name:
          type: string
          description: Domain name in the requested locale
        description:
          type: string
          nullable: true
          description: Domain description in the requested locale
        parent:
          $ref: '#/components/schemas/BusinessDomainSummaryResponse'
        type:
          $ref: '#/components/schemas/BusinessDomainType'
        effectiveType:
          $ref: '#/components/schemas/BusinessDomainType'
        classificationAssignments:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationAssignmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LocalizedBusinessEntityResponse:
      type: object
      required:
      - key
      - name
      - createdAt
      - updatedAt
      properties:
        key:
          type: string
          description: BusinessEntity key
        name:
          type: string
          description: Entity name in the requested locale
        description:
          type: string
          nullable: true
          description: Entity description in the requested locale
        dataOwner:
          $ref: '#/components/schemas/UserSummaryResponse'
        parent:
          $ref: '#/components/schemas/BusinessEntitySummaryResponse'
        boundedContext:
          $ref: '#/components/schemas/BoundedContextSummaryResponse'
        classificationAssignments:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationAssignmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LocalizedText:
