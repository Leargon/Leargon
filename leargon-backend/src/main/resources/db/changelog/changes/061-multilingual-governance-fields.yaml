  # ── Data migration: wrap existing plain-text values in JSON array format ──────
  #
  # Each statement normalises a legacy scalar column into a LocalizedText JSON array:
  #   • a non-empty value        -> [{"locale":"en","text": <value>}]  (JSON_QUOTE-escaped)
  #   • an empty/whitespace value -> NULL   (an empty string is not valid JSON and would break
  #                                          the List<LocalizedText> read; NULL is the "no value" state)
  #   • a value already in array form -> left untouched (idempotent re-run guard)

  - changeSet:
      id: 061-migrate-retention-period-to-json
      author: leargon
      comment: Wrap existing retention_period string values in a LocalizedText JSON array (empty -> NULL)
      changes:
        - sql:
            dbms: mysql
            sql: >
              UPDATE business_entities
              SET retention_period = CASE WHEN TRIM(retention_period) = '' THEN NULL
                ELSE CONCAT('[{"locale":"en","text":', JSON_QUOTE(retention_period), '}]') END
              WHERE retention_period IS NOT NULL
              AND NOT (TRIM(retention_period) LIKE '[%' AND TRIM(retention_period) LIKE '%]');

