  - changeSet:
      id: 061-migrate-cross-border-transfer-notes-to-json
      author: leargon
      comment: Wrap string notes inside cross_border_transfers JSON array to LocalizedText format
      changes:
        - sql:
            dbms: mysql
            sql: |
              UPDATE processes p
              SET cross_border_transfers = (
                SELECT IFNULL(JSON_ARRAYAGG(
                  JSON_OBJECT(
                    'destinationCountry', JSON_UNQUOTE(t.dc),
                    'safeguard', JSON_UNQUOTE(t.sg),
                    'notes', CASE
                      WHEN t.notes IS NULL THEN JSON_ARRAY()
                      WHEN JSON_TYPE(t.notes) = 'STRING' AND JSON_UNQUOTE(t.notes) = '' THEN JSON_ARRAY()
                      WHEN JSON_TYPE(t.notes) = 'STRING' THEN JSON_ARRAY(JSON_OBJECT('locale', 'en', 'text', JSON_UNQUOTE(t.notes)))
                      ELSE t.notes
                    END
                  )
                ), JSON_ARRAY())
                FROM JSON_TABLE(
                  p.cross_border_transfers,
                  '$[*]' COLUMNS (
                    ord FOR ORDINALITY,
                    dc JSON PATH '$.destinationCountry',
                    sg JSON PATH '$.safeguard',
                    notes JSON PATH '$.notes'
                  )
                ) t
              )
              WHERE cross_border_transfers IS NOT NULL
                AND JSON_TYPE(cross_border_transfers) = 'ARRAY'
                AND JSON_LENGTH(cross_border_transfers) > 0;
