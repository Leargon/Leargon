databaseChangeLog:
  - changeSet:
      id: 027-update-processes-for-bounded-contexts
      author: leargon
      changes:
        - addColumn:
            tableName: processes
            columns:
              - column:
                  name: bounded_context_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: processes
            baseColumnNames: bounded_context_id
            constraintName: fk_processes_bounded_context_id
            referencedTableName: bounded_contexts
            referencedColumnNames: id
            onDelete: SET NULL
        - dropForeignKeyConstraint:
            baseTableName: processes
            constraintName: fk_processes_business_domain_id
        - dropIndex:
            tableName: processes
            indexName: idx_processes_business_domain
        - dropColumn:
            tableName: processes
            columnName: business_domain_id
        - createIndex:
            indexName: idx_processes_bounded_context
            tableName: processes
            columns:
              - column:
                  name: bounded_context_id
