databaseChangeLog:
  - changeSet:
      id: 053-add-owning-unit-to-business-entities
      author: leargon
      changes:
        - addColumn:
            tableName: business_entities
            columns:
              - column:
                  name: owning_unit_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_business_entity_owning_unit
                    references: organisational_units(id)

  - changeSet:
      id: 053-add-owning-unit-to-processes
      author: leargon
      changes:
        - addColumn:
            tableName: processes
            columns:
              - column:
                  name: owning_unit_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_process_owning_unit
                    references: organisational_units(id)
