databaseChangeLog:
  # ── Corrective migration for 061 ─────────────────────────────────────────────
  #
  # 061 wrapped legacy scalar values into a single-entry LocalizedText JSON array
  # hardcoded to locale "en". Where the deployment's configured default locale is
  # NOT "en", relabel those freshly-migrated single-entry "en" arrays to the real
  # default locale. Runs right after 061 in the same startup pass, so the only
  # "en"-tagged entries present are the ones 061 just created (these columns had no
  # locale concept before 061). Each statement is self-guarding (no-op when the
  # default locale is "en") and idempotent (only single-entry "en" arrays).
  #
  # NOTE: one single statement per changeSet — Liquibase sends each `sql` block to
  # JDBC as one statement, and MySQL rejects multi-statement blocks (no allowMultiQueries).

  - changeSet:
      id: 062-relabel-retention-period-default-locale
      author: leargon
      changes:
        - sql:
            dbms: mysql
            sql: >
              UPDATE business_entities
              SET retention_period = JSON_SET(retention_period, '$[0].locale',
                (SELECT locale_code FROM supported_locales WHERE is_default = 1 LIMIT 1))
              WHERE (SELECT locale_code FROM supported_locales WHERE is_default = 1 LIMIT 1) <> 'en'
                AND retention_period IS NOT NULL AND JSON_VALID(retention_period)
                AND JSON_LENGTH(retention_period) = 1
                AND JSON_UNQUOTE(JSON_EXTRACT(retention_period, '$[0].locale')) = 'en'

