databaseChangeLog:
  - changeSet:
      id: 016-create-data-processors-table
      author: leargon
      changes:
        - createTable:
            tableName: data_processors
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: names
                  type: JSON
                  constraints:
                    nullable: false
              - column:
                  name: processing_countries
                  type: JSON
                  constraints:
                    nullable: false
              - column:
                  name: processor_agreement_in_place
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: sub_processors_approved
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - createIndex:
            indexName: idx_data_processors_key
            tableName: data_processors
            columns:
              - column:
                  name: key

  - changeSet:
      id: 016-create-data-processor-business-entities-table
      author: leargon
      changes:
        - createTable:
            tableName: data_processor_business_entities
            columns:
              - column:
                  name: data_processor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: business_entity_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: data_processor_business_entities
            columnNames: data_processor_id, business_entity_id
            constraintName: pk_data_processor_business_entities

        - addForeignKeyConstraint:
            baseTableName: data_processor_business_entities
            baseColumnNames: data_processor_id
            constraintName: fk_dp_be_data_processor_id
            referencedTableName: data_processors
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: data_processor_business_entities
            baseColumnNames: business_entity_id
            constraintName: fk_dp_be_business_entity_id
            referencedTableName: business_entities
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            indexName: idx_dp_be_data_processor
            tableName: data_processor_business_entities
            columns:
              - column:
                  name: data_processor_id
        - createIndex:
            indexName: idx_dp_be_business_entity
            tableName: data_processor_business_entities
            columns:
              - column:
                  name: business_entity_id

  - changeSet:
      id: 016-create-data-processor-processes-table
      author: leargon
      changes:
        - createTable:
            tableName: data_processor_processes
            columns:
              - column:
                  name: data_processor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: process_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: data_processor_processes
            columnNames: data_processor_id, process_id
            constraintName: pk_data_processor_processes

        - addForeignKeyConstraint:
            baseTableName: data_processor_processes
            baseColumnNames: data_processor_id
            constraintName: fk_dp_proc_data_processor_id
            referencedTableName: data_processors
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: data_processor_processes
            baseColumnNames: process_id
            constraintName: fk_dp_proc_process_id
            referencedTableName: processes
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            indexName: idx_dp_proc_data_processor
            tableName: data_processor_processes
            columns:
              - column:
                  name: data_processor_id
        - createIndex:
            indexName: idx_dp_proc_process
            tableName: data_processor_processes
            columns:
              - column:
                  name: process_id
