databaseChangeLog:
  - changeSet:
      id: 012-make-user-references-nullable-business-domains
      author: leargon
      comment: Make created_by_id nullable in business_domains with ON DELETE SET NULL to support hard-deleting users with no ownership.
      changes:
        - dropForeignKeyConstraint:
            baseTableName: business_domains
            constraintName: fk_business_domains_created_by_id
        - dropNotNullConstraint:
            tableName: business_domains
            columnName: created_by_id
            columnDataType: BIGINT
        - addForeignKeyConstraint:
            baseTableName: business_domains
            baseColumnNames: created_by_id
            constraintName: fk_business_domains_created_by_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL

