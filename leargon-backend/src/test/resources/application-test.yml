micronaut:
  application:
    name: leargon-backend-test
  server:
    port: -1
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: testsecretkeythatisverylong32characters
        generator:
          access-token:
            expiration: 3600
    intercept-url-map:
      - pattern: /authentication/**
        access: isAnonymous()
  openapi:
    enabled: false

datasources:
  default:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: false

liquibase:
  enabled: false
